<!DOCTYPE html>
<html>
<head>
    <title>AgriLink - Join Us</title>
      <link rel="stylesheet" href="form.css">

        

</head>

<body>

<header>
    <h1> Join AgriLink</h1>
    <p>Become part of our agricultural community</p>
</header>

<div class="container">

<form>

<div>
<label>Full Name</label>
<input type="text" required>
</div>

<div>
<label>Email Address</label>
<input type="email" required>
</div>

<div>
<label>Phone Number</label>
<input type="text">
</div>

<div>
<label>Location</label>
<input type="text">
</div>

<div>
<label>Select Your Role</label>
<select>
    <option>Farmer</option>
    <option>Buyer</option>
    <option>Retailer / Vendor</option>
    <option>Partner Organization</option>
</select>
</div>

<div>
<label>Products / Interests</label>
<input type="text">
</div>

<div class="full-width">
<label>Challenges You Face</label>
<textarea rows="4"></textarea>
</div>

<div class="full-width">
<label>Additional Suggestions</label>
<textarea rows="4"></textarea>
</div>

<div class="full-width">
<button type="submit">Submit Registration</button>
</div>

</form>

<div class="back">
    <a href="index.html">⬅ Back to Home</a>
</div>

</div>

</body>
</html>
